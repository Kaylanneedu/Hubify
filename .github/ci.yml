name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 black pytest httpx

      - name: Verificar formatação com Black
        run: black --check backend/

      - name: Lint com Flake8
        run: flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Executar testes (se houver)
        run: |
          cd backend
          pytest 

      - name: Testar se a aplicação inicia
        run: |
          cd backend
          # Cria .env com as variáveis necessárias
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "DATABASE_URL=sqlite:///./test.db" >> .env
          echo "DEBUG=false" >> .env
          echo "ENVIRONMENT=test" >> .env
          
          # Inicia o servidor em background
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          
          # Testa o endpoint /health
          curl --fail http://127.0.0.1:8000/health || exit 1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}